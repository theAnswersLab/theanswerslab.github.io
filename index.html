  h1{font-family:'Lora',Georgia,serif;font-size:24px;color:var(--navy);max-width:480px;margin-bottom:12px;}
  p{font-size:15px;color:var(--muted);max-width:440px;}
  .contact{margin-top:26px;font-size:13px;color:var(--muted);}
  .contact a{color:var(--accent-dark);}
